[package]
name = "pdf-editor"
version = "0.1.0"
description = "A high-performance PDF editor"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["default"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
pdfium-render = "0.9.1"
lopdf = "0.41.0"
pulldown-cmark = "0.13.4"
image = "0.25"
