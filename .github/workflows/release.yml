name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (must already exist, e.g. v0.5.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  build-linux:
    if: github.event_name == 'workflow_dispatch'
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "SCCACHE_CACHE_SIZE=2G" >> $GITHUB_ENV

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libcups2-dev mold

      - name: Install npm deps
        run: npm ci

      - name: Fetch PDFium
        run: scripts/fetch-pdfium.sh

      - name: Prefetch AppImage tooling
        run: scripts/fetch-appimage-tools.sh

      - name: Build deb, rpm, and AppImage packages
        env:
          NO_STRIP: 1
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles deb,rpm,appimage

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          # Package files only — bundle/* also holds staging trees (deb data
          # dirs, .AppDir) that must not become release assets.
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  build-macos:
    if: github.event_name == 'workflow_dispatch'
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "SCCACHE_CACHE_SIZE=2G" >> $GITHUB_ENV

      - name: Install npm deps
        run: npm ci

      - name: Fetch PDFium
        run: scripts/fetch-pdfium.sh

      - name: Build macOS bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${APPLE_CERTIFICATE_BASE64}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD}" ]; then
            echo "Apple signing secrets not configured; skipping certificate import."
            exit 0
          fi
          scripts/import-apple-cert.sh

      - name: Sign and notarize macOS bundles
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${APPLE_SIGNING_IDENTITY}" ]; then
            echo "Apple signing identity not configured; skipping macOS signing."
            exit 0
          fi
          scripts/sign-macos.sh

      - name: Upload macOS bundles
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          # dmg + updater archive only; bundle/macos also holds the raw .app tree.
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    if: github.event_name == 'workflow_dispatch'
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "SCCACHE_CACHE_SIZE=2G" >> $GITHUB_ENV

      - name: Install npm deps
        run: npm ci

      - name: Fetch PDFium
        shell: bash
        run: scripts/fetch-pdfium.sh

      - name: Build Windows bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Sign Windows bundles
        shell: bash
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${WINDOWS_CERTIFICATE_BASE64}" ] || [ -z "${WINDOWS_CERTIFICATE_PASSWORD}" ]; then
            echo "Windows signing secrets not configured; skipping signing."
            exit 0
          fi
          cert_path="$RUNNER_TEMP/pdf-panda-signing.pfx"
          printf '%s' "$WINDOWS_CERTIFICATE_BASE64" | base64 --decode > "$cert_path"
          scripts/sign-windows.sh "$cert_path"

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/pdf-panda.exe

  publish:
    if: github.event_name == 'workflow_dispatch'
    name: Publish GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate updater manifest (latest.json)
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: python3 scripts/generate-latest-json.py release-artifacts "$RELEASE_TAG"

      - name: Generate SHA256 checksums
        run: scripts/release-checksums.sh release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            release-artifacts/**
          generate_release_notes: true
