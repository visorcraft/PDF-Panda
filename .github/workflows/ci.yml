name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "SCCACHE_CACHE_SIZE=2G" >> $GITHUB_ENV

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev mold

      - name: Install npm deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vite build
        run: npx vite build

      - name: Rustfmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Tauri build (production artifact)
        run: npx tauri build --no-bundle

  e2e-linux:
    name: E2E (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev mold xvfb

      - name: Install npm deps
        run: |
          npm ci
          npm ci --prefix e2e

      - name: WebDriver smoke suite
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target
        run: scripts/e2e-test.sh
